<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style> body { padding: 26px; background: var(--surface-page); } .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; align-items:start; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SpaceCard, PlanCard, RoomCard, PerkCard } = window.TheQuarterDesignSystem_2f2064;
  function Demo() {
    return (
      <div className="grid">
        <SpaceCard name="The Quarter Café" tag="Open social space"
          blurb="The cathedral view, natural light and the breakfast. Not bookable — just ours to share."
          imageCaption="Café with cathedral view & plants"
          meta={[{icon:'coffee',label:'Lavazza & breakfast'},{icon:'leaf',label:'Plantspiration'}]} />
        <RoomCard name="The Hop Yard" capacity="8–10" status="available"
          blurb="High-spec meeting room, hybrid-ready, cathedral on the skyline."
          imageCaption="Bright meeting room with AV"
          features={[{icon:'monitor',label:'Plug-and-play A/V'},{icon:'wifi',label:'Fibre'}]}
          priceNote="Half & full-day packages" />
        <PlanCard name="Citizen" price="£258" period="a month" featured badge="Most popular"
          summary="Unrestricted access for those who are here most days."
          features={['Everything in Resident','Unrestricted access','Priority room booking','Daily breakfast & Lavazza']} />
        <div style={{ display:'grid', gap:20 }}>
          <PerkCard partner="The Pound Bar" category="Food & drink" perk="20% off brunch, Mon–Fri" expires="Ends 30 Jun" />
          <PerkCard partner="Curzon Canterbury" category="Culture" perk="2-for-1 cinema tickets midweek" redeemed />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
