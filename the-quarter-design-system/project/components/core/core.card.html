<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { padding: 28px; background: var(--surface-page); }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 22px; }
  .lab { font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-muted); font-weight: 600; width: 100%; margin-bottom: -6px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Avatar, Icon } = window.TheQuarterDesignSystem_2f2064;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lab">Buttons</span>
          <Button variant="primary" iconAfter="arrow-right">Book a day pass</Button>
          <Button variant="accent">Reserve a room</Button>
          <Button variant="secondary" icon="calendar">Availability</Button>
          <Button variant="ghost">Cancel</Button>
        </div>
        <div className="row">
          <Button size="sm" variant="primary">Small</Button>
          <Button size="lg" variant="accent" iconAfter="arrow-right">Large</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row"><span className="lab">Icon buttons</span>
          <IconButton icon="menu" label="Menu" variant="soft" />
          <IconButton icon="search" label="Search" variant="outline" />
          <IconButton icon="bell" label="Alerts" variant="ghost" />
          <IconButton icon="arrow-right" label="Next" variant="solid" />
        </div>
        <div className="row"><span className="lab">Badges</span>
          <Badge tone="available" dot>Available now</Badge>
          <Badge tone="busy" dot>In use</Badge>
          <Badge tone="soon" dot>Free at 14:00</Badge>
          <Badge tone="gold" icon="check">Included</Badge>
          <Badge tone="ink">Citizen</Badge>
        </div>
        <div className="row"><span className="lab">Avatars & icons</span>
          <Avatar name="Maya Holloway" />
          <Avatar name="Tom Reeve" size="lg" />
          <Avatar name="Priya N" size="sm" />
          <span style={{ display:'inline-flex', gap:14, color:'var(--ink-900)', marginLeft:8 }}>
            <Icon name="coffee" /><Icon name="wifi" /><Icon name="leaf" /><Icon name="calendar" /><Icon name="users" /><Icon name="gift" /><Icon name="map-pin" />
          </span>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
