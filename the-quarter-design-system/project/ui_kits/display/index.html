<!-- @startingPoint section="Display" subtitle="Wall-mounted in-office availability board" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Quarter — Today</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="icon" href="../../assets/app-icon.png" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #board { width: 1920px; height: 1080px; transform-origin: center center; }
</style>
</head>
<body>
<div id="stage"><div id="board"><div id="root"></div></div></div>
<script type="text/babel">
  const { Icon } = window.TheQuarterDesignSystem_2f2064;

  const ROOMS = [
    { name: 'The Board Room', cap: '8–10', status: 'available', detail: 'Free until 14:00' },
    { name: 'The Hop Yard', cap: '6–8', status: 'busy', detail: 'In use · free at 14:00', who: 'Studio Holloway' },
    { name: 'The Chapter House', cap: '4–6', status: 'available', detail: 'Free all afternoon' },
  ];
  const WHATSON = [
    { time: '08:30', title: 'Friday breakfast social', where: 'The Café' },
    { time: '12:30', title: "Members' lunch & learn", where: 'The Board Room' },
    { time: '17:30', title: 'Plantspiration: repotting', where: 'The Main Space' },
  ];

  const STATUS = {
    available: { bg: 'linear-gradient(160deg,#332d1c,#15120c)', chip: '#E4CE9F', label: 'Available', dot: '#D2B576' },
    busy: { bg: 'linear-gradient(160deg,#2A251E,#14110D)', chip: '#E0A48C', label: 'In use', dot: '#D98C73' },
  };

  function Clock() {
    const [now, setNow] = React.useState(new Date());
    React.useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    return <span>{hh}:{mm}</span>;
  }

  function Board() {
    return (
      <div style={{ width: 1920, height: 1080, background: 'var(--ink-900)', color: 'var(--sand-50)', padding: '70px 80px', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', fontFamily: 'var(--font-sans)' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', borderBottom: '2px solid rgba(251,248,242,0.16)', paddingBottom: 36 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 26 }}>
            <img src="../../assets/app-icon.png" alt="The Quarter" style={{ width: 84, height: 84, borderRadius: 20 }} />
            <div>
              <div style={{ fontSize: 30, fontWeight: 600, color: 'var(--gold-400)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Welcome to The Quarter</div>
              <div style={{ fontSize: 52, fontWeight: 700, letterSpacing: '-0.03em', marginTop: 6 }}>Friday 20 June</div>
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 112, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.9 }}><Clock /></div>
            <div style={{ fontSize: 28, color: 'rgba(251,248,242,0.66)', marginTop: 8 }}>Cathedral Quarter, Canterbury</div>
          </div>
        </div>

        {/* Rooms */}
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '44px 0 26px' }}>
          <h2 style={{ fontSize: 40, fontWeight: 700, letterSpacing: '-0.02em' }}>Meeting rooms</h2>
          <span style={{ fontSize: 26, color: 'rgba(251,248,242,0.6)' }}>Today's availability</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 30, flex: 1 }}>
          {ROOMS.map(r => {
            const s = STATUS[r.status];
            return (
              <div key={r.name} style={{ background: s.bg, borderRadius: 32, padding: '40px 42px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', border: '1px solid rgba(251,248,242,0.1)' }}>
                <div>
                  <div style={{ display: 'inline-flex', alignItems: 'center', gap: 14, padding: '12px 22px', borderRadius: 999, background: 'rgba(0,0,0,0.28)', marginBottom: 30 }}>
                    <span style={{ width: 18, height: 18, borderRadius: '50%', background: s.dot }} />
                    <span style={{ fontSize: 28, fontWeight: 700, color: s.chip, letterSpacing: '0.02em' }}>{s.label}</span>
                  </div>
                  <div style={{ fontSize: 54, fontWeight: 700, letterSpacing: '-0.03em', lineHeight: 1.02 }}>{r.name}</div>
                  <div style={{ fontSize: 28, color: 'rgba(251,248,242,0.66)', marginTop: 12, display: 'flex', alignItems: 'center', gap: 12 }}>
                    <Icon name="users" size={30} color="var(--gold-400)" /> Seats {r.cap}
                  </div>
                </div>
                <div style={{ borderTop: '1px solid rgba(251,248,242,0.14)', paddingTop: 26, fontSize: 32, fontWeight: 600 }}>
                  {r.detail}
                  {r.who ? <div style={{ fontSize: 24, fontWeight: 500, color: 'rgba(251,248,242,0.55)', marginTop: 6 }}>{r.who}</div> : null}
                </div>
              </div>
            );
          })}
        </div>

        {/* What's on */}
        <div style={{ marginTop: 40, background: 'rgba(251,248,242,0.05)', borderRadius: 28, padding: '30px 42px', display: 'flex', alignItems: 'center', gap: 50 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 18, flex: 'none' }}>
            <Icon name="sparkles" size={40} color="var(--gold-400)" />
            <span style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.01em' }}>What's on today</span>
          </div>
          <div style={{ display: 'flex', gap: 56, flex: 1, justifyContent: 'space-around' }}>
            {WHATSON.map(e => (
              <div key={e.title} style={{ display: 'flex', alignItems: 'baseline', gap: 18 }}>
                <span style={{ fontSize: 34, fontWeight: 700, color: 'var(--gold-400)', letterSpacing: '-0.01em' }}>{e.time}</span>
                <div>
                  <div style={{ fontSize: 27, fontWeight: 600 }}>{e.title}</div>
                  <div style={{ fontSize: 22, color: 'rgba(251,248,242,0.55)' }}>{e.where}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Board />);

  function fit() {
    const b = document.getElementById('board');
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    b.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit); fit();
</script>
</body>
</html>
