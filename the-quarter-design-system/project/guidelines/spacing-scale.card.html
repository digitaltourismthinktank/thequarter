<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale (8px base)" subtitle="Generous whitespace is a brand value" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px 26px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .bar { background:var(--gold-400); border-radius:3px; width:100%; }
  .n { font-size:11px; color:var(--text-muted); font-family:var(--font-mono); }
  .col span.t { font-size:12px; font-weight:600; color:var(--ink-900); }
</style></head><body>
<div class="row">
  <div class="col" style="width:38px"><div class="bar" style="height:8px"></div><span class="t">2</span><span class="n">8</span></div>
  <div class="col" style="width:42px"><div class="bar" style="height:16px"></div><span class="t">4</span><span class="n">16</span></div>
  <div class="col" style="width:48px"><div class="bar" style="height:24px"></div><span class="t">5</span><span class="n">24</span></div>
  <div class="col" style="width:54px"><div class="bar" style="height:32px"></div><span class="t">6</span><span class="n">32</span></div>
  <div class="col" style="width:62px"><div class="bar" style="height:48px"></div><span class="t">8</span><span class="n">48</span></div>
  <div class="col" style="width:72px"><div class="bar" style="height:64px"></div><span class="t">9</span><span class="n">64</span></div>
  <div class="col" style="width:96px"><div class="bar" style="height:80px"></div><span class="t">10</span><span class="n">80</span></div>
  <div class="col" style="width:130px"><div class="bar" style="height:104px"></div><span class="t">11</span><span class="n">104</span></div>
</div>
</body></html>
