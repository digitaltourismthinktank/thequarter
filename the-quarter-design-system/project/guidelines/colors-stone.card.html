<!-- @dsCard group="Colors" viewport="700x140" name="Warm neutrals — Stone (text & borders)" subtitle="Muted warm greys for body text, borders, captions" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-sm); height:88px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; }
  .nm { font-size:var(--text-xs); font-weight:600; color:var(--sand-50); }
  .hx { font-size:10px; font-family:var(--font-mono); color:rgba(251,248,242,0.65); }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--stone-300)"><span class="nm" style="color:var(--ink-900)">stone-300</span><span class="hx" style="color:var(--stone-600)">BCB1A0</span></div>
  <div class="sw" style="background:var(--stone-400)"><span class="nm">stone-400</span><span class="hx">9C8F7B</span></div>
  <div class="sw" style="background:var(--stone-500)"><span class="nm">stone-500</span><span class="hx">7E715E</span></div>
  <div class="sw" style="background:var(--stone-600)"><span class="nm">stone-600</span><span class="hx">645949</span></div>
  <div class="sw" style="background:var(--stone-700)"><span class="nm">stone-700</span><span class="hx">4A4136</span></div>
</div>
</body></html>
