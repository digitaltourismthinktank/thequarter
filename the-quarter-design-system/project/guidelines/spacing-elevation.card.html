<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Soft, warm-tinted shadows cast in espresso — nothing floats hard" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:30px 26px; background:var(--surface-page); }
  .row { display:flex; gap:26px; align-items:center; }
  .col { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:96px; height:66px; background:var(--pure-white); border-radius:var(--radius-lg); }
  .n { font-size:12px; font-weight:600; color:var(--ink-900); }
  .m { font-size:10px; font-family:var(--font-mono); color:var(--text-muted); }
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="n">card</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-gold)"></div><span class="n">gold glow</span><span class="m">Quarter Card</span></div>
</div>
</body></html>
