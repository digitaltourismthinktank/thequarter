<!-- @dsCard group="Colors" viewport="700x150" name="Gold scale (the accent)" subtitle="From soft wash to deep gold text — use sparingly & precisely" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:8px; }
  .sw { flex:1; border-radius:var(--radius-sm); height:84px; display:flex; flex-direction:column; justify-content:flex-end; padding:9px 11px; border:1px solid rgba(0,0,0,0.04); }
  .nm { font-size:11px; font-weight:600; }
  .hx { font-size:10px; font-family:var(--font-mono); opacity:0.7; }
  .note { margin-top:12px; font-size:var(--text-xs); color:var(--text-muted); }
  .note b { color:var(--gold-700); }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--gold-100)"><span class="nm" style="color:var(--gold-700)">100</span><span class="hx" style="color:var(--gold-700)">F7EEDA</span></div>
  <div class="sw" style="background:var(--gold-200)"><span class="nm" style="color:var(--gold-700)">200</span><span class="hx" style="color:var(--gold-700)">F0E3C7</span></div>
  <div class="sw" style="background:var(--gold-300)"><span class="nm" style="color:var(--gold-700)">300</span><span class="hx" style="color:var(--gold-700)">E4CE9F</span></div>
  <div class="sw" style="background:var(--gold-400)"><span class="nm" style="color:var(--ink-900)">400</span><span class="hx" style="color:var(--stone-700)">D2B576</span></div>
  <div class="sw" style="background:var(--gold-500)"><span class="nm" style="color:var(--ink-900)">500</span><span class="hx" style="color:var(--stone-700)">BE9B53</span></div>
  <div class="sw" style="background:var(--gold-600)"><span class="nm" style="color:var(--sand-50)">600</span><span class="hx" style="color:rgba(255,255,255,0.7)">A6823C</span></div>
  <div class="sw" style="background:var(--gold-700)"><span class="nm" style="color:var(--sand-50)">700</span><span class="hx" style="color:rgba(255,255,255,0.7)">8A6A2E</span></div>
</div>
<div class="note"><b>gold-500</b> is the primary accent (fills, the Quarter Card). <b>gold-700</b> is the only gold that passes contrast for text on light.</div>
</body></html>
