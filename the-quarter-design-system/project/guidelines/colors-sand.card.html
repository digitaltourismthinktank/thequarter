<!-- @dsCard group="Colors" viewport="700x140" name="Warm neutrals — Sand (surfaces)" subtitle="Cream-to-tan paper scale for backgrounds & surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-sm); height:88px; border:1px solid var(--border-subtle); display:flex; flex-direction:column; justify-content:flex-end; padding:10px 12px; }
  .nm { font-size:var(--text-xs); font-weight:600; color:var(--ink-900); }
  .hx { font-size:10px; font-family:var(--font-mono); color:var(--stone-500); }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--sand-50)"><span class="nm">sand-50</span><span class="hx">FBF8F2</span></div>
  <div class="sw" style="background:var(--sand-100)"><span class="nm">sand-100</span><span class="hx">F6F1E8</span></div>
  <div class="sw" style="background:var(--sand-200)"><span class="nm">sand-200</span><span class="hx">EEE6D8</span></div>
  <div class="sw" style="background:var(--sand-300)"><span class="nm">sand-300</span><span class="hx">E3D8C4</span></div>
  <div class="sw" style="background:var(--sand-400)"><span class="nm">sand-400</span><span class="hx">D2C3A8</span></div>
</div>
</body></html>
