<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & labels" subtitle="Uppercase gold overlines + micro UI labels" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px 26px; background:var(--surface-page); display:flex; flex-direction:column; gap:18px; }
  .eb { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.14em; color:var(--gold-700); }
  .lbl { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.14em; color:var(--text-muted); }
  .grp { display:flex; flex-direction:column; gap:5px; }
  .meta { font-size:10px; font-family:var(--font-mono); color:var(--text-muted); }
</style></head><body>
  <div class="grp"><span class="eb">The Cathedral Quarter</span><span class="meta">eyebrow · 12px · 600 · uppercase · tracking 0.14em · gold-700</span></div>
  <div class="grp"><span class="lbl">Days remaining</span><span class="meta">UI label · 11px · 600 · uppercase · stone-500</span></div>
</body></html>
