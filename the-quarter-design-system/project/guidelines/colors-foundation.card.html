<!-- @dsCard group="Colors" viewport="700x150" name="Foundation — black, white & gold" subtitle="The three-colour spine: ink, paper, gold accent" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:var(--radius-md); padding:14px 16px; display:flex; flex-direction:column; justify-content:flex-end; height:104px; border:1px solid var(--border-subtle); }
  .nm { font-size:var(--text-sm); font-weight:600; }
  .hx { font-size:var(--text-xs); opacity:0.7; font-family:var(--font-mono); }
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--ink-900);color:var(--sand-50);border-color:var(--ink-900)"><span class="nm">Ink</span><span class="hx">#1E1A15</span></div>
  <div class="sw" style="background:var(--pure-white);color:var(--ink-900)"><span class="nm">Paper / White</span><span class="hx">#FFFFFF</span></div>
  <div class="sw" style="background:var(--sand-50);color:var(--ink-900)"><span class="nm">Page (cream)</span><span class="hx">#FBF8F2</span></div>
  <div class="sw" style="background:var(--gold-500);color:var(--ink-900);border-color:var(--gold-500)"><span class="nm">Gold accent</span><span class="hx">#BE9B53</span></div>
</div>
</body></html>
