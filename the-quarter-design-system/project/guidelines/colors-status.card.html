<!-- @dsCard group="Colors" viewport="700x150" name="Status colours" subtitle="Warm-shifted functional colours — status only, never brand. No green in UI." -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; }
  .item { flex:1; display:flex; flex-direction:column; gap:8px; }
  .pill { display:inline-flex; align-items:center; gap:7px; padding:7px 13px; border-radius:999px; font-size:var(--text-xs); font-weight:600; width:fit-content; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .hx { font-size:10px; font-family:var(--font-mono); color:var(--text-muted); }
</style></head><body>
<div class="row">
  <div class="item"><span class="pill" style="background:rgba(75,122,82,0.12);color:var(--success)"><span class="dot" style="background:var(--success)"></span>Available</span><span class="hx">--success #4B7A52 · status text only</span></div>
  <div class="item"><span class="pill" style="background:rgba(181,134,47,0.14);color:var(--warning)"><span class="dot" style="background:var(--warning)"></span>Held / free soon</span><span class="hx">--warning #B5862F</span></div>
  <div class="item"><span class="pill" style="background:rgba(169,68,47,0.12);color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>In use</span><span class="hx">--danger #A9442F</span></div>
  <div class="item"><span class="pill" style="background:rgba(74,98,117,0.12);color:var(--info)"><span class="dot" style="background:var(--info)"></span>Info</span><span class="hx">--info #4A6275</span></div>
</div>
</body></html>
