<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:16px; }
  .panel { flex:1; height:150px; border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center; border:1px solid var(--border-subtle); position:relative; }
  .cap { position:absolute; bottom:10px; left:14px; font-size:10px; font-weight:600; letter-spacing:0.04em; }
</style></head><body>
<div class="row">
  <div class="panel" style="background:var(--sand-50)"><img src="../assets/logo-wordmark-black.png" alt="The Quarter" style="height:54px" /><span class="cap" style="color:var(--text-muted)">On cream / white</span></div>
  <div class="panel" style="background:var(--ink-900)"><img src="../assets/logo-wordmark-white.png" alt="The Quarter" style="height:54px" /><span class="cap" style="color:rgba(251,248,242,0.6)">On ink</span></div>
</div>
</body></html>
