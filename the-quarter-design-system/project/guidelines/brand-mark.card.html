<!-- @dsCard group="Brand" viewport="700x220" name="Brand mark & app icon" subtitle="The rounded-square mark with its quarter-circle motif" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:20px; align-items:center; }
  .panel { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .cap { font-size:11px; font-weight:600; color:var(--text-muted); }
  .note { flex:1; font-size:var(--text-sm); color:var(--text-body); line-height:1.55; }
  .note b { color:var(--ink-900); }
</style></head><body>
<div class="row">
  <div class="panel"><img src="../assets/app-icon.png" alt="App icon" style="width:118px; border-radius:26px; box-shadow:var(--shadow-md)" /><span class="cap">App icon</span></div>
  <div class="panel"><img src="../assets/logo-square-rounded.png" alt="Rounded mark" style="width:118px; border-radius:26px; box-shadow:var(--shadow-md)" /><span class="cap">Avatar / favicon</span></div>
  <p class="note">The <b>quarter-circle cut</b> in the icon is the brand's one geometric motif — it echoes the "Quarter" name and reappears as the gold arc on the Quarter Card and in section accents. Keep the wordmark exactly as provided; never redraw it.</p>
</div>
</body></html>
