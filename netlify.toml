# The Quarter — Netlify build config.
# Static export (next.config.mjs → output: 'export') outputs to `out/`, served
# straight from Netlify's CDN. The enquiry/contact forms POST to the `enquiry`
# Netlify Function (Resend), not Netlify Forms.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Set NEXT_PUBLIC_SITE_URL in the Netlify UI (Site settings → Environment) to the
  # production domain so canonical URLs, sitemap and Open Graph resolve correctly.
  # Set the commerce URLs too when ready:
  #   NEXT_PUBLIC_STRIPE_VISITOR_URL / _RESIDENT_URL / _CITIZEN_URL / _HYBRID_OFFICE_URL
  #   NEXT_PUBLIC_TYPEFORM_DAYPASS_URL
  # For the one-click billing-portal function: MEMBERSTACK_SECRET_KEY, STRIPE_SECRET_KEY

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Verification + invite are dynamic, link-only pages. Static export can't pre-render
# arbitrary tokens, so serve a single shell for any /v/<token> (and /i/<code>) and let
# it read the token from the path client-side. 200 = rewrite (keeps the pretty URL).
[[redirects]]
  from = "/v/*"
  to = "/v/"
  status = 200

[[redirects]]
  from = "/i/*"
  to = "/i/"
  status = 200

# Partner self-service balance is the same shape: one shell served for any
# /partner/<token>, reading the token from the path client-side (no login).
[[redirects]]
  from = "/partner/*"
  to = "/partner/"
  status = 200

# Pretty URL for the members' events calendar subscription (webcal://…/events.ics).
[[redirects]]
  from = "/events.ics"
  to = "/.netlify/functions/calendar?type=events"
  status = 200

# --- Canonical host = the bare apex thequarter.work (set as the PRIMARY domain in
#     Netlify, which auto-301s www → apex). No app-level host redirect here — one would
#     fight Netlify's primary-domain redirect and cause an apex⇄www loop. ---

# --- Legacy paths from the previous site → the new structure (301, so indexed old
#     URLs + link equity carry over). Mapped from the OLD site's own sitemap.xml
#     (/about, /spaces, /location keep the same path, so they need no redirect). ---
[[redirects]]
  from = "/pricing"
  to = "/plans"
  status = 301
[[redirects]]
  from = "/book-your-desk"
  to = "/day-pass"
  status = 301
[[redirects]]
  from = "/meetings"
  to = "/meeting-rooms"
  status = 301
[[redirects]]
  from = "/terms-conditions"
  to = "/terms"
  status = 301
[[redirects]]
  from = "/log-in"
  to = "/login"
  status = 301
[[redirects]]
  from = "/sign-up"
  to = "/signup"
  status = 301
[[redirects]]
  from = "/reset-password"
  to = "/login"
  status = 301
[[redirects]]
  from = "/update-password"
  to = "/login"
  status = 301
[[redirects]]
  from = "/access-denied"
  to = "/login"
  status = 301
[[redirects]]
  from = "/user-account"
  to = "/dashboard"
  status = 301
[[redirects]]
  from = "/dashboard/home"
  to = "/dashboard"
  status = 301
[[redirects]]
  from = "/p4g2m05n4r"
  to = "/"
  status = 301
# Common inbound aliases (not in the old sitemap, but cheap insurance).
[[redirects]]
  from = "/contact"
  to = "/location"
  status = 301
[[redirects]]
  from = "/book-a-tour"
  to = "/tour"
  status = 301
